<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>EssereInRegola · Documenti e norme pronti per ogni controllo</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#178f5a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="EssereInRegola">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#1b2420; --ink2:#7c857f; --ink3:#aab0ab;
  --bg:#f4f5f0; --card:#ffffff;
  --verde:#178f5a; --verde-d:#0f7a4b; --verde-l:#22a96c; --verde-soft:#e2f4ea;
  --rosso:#e8503a; --rosso-d:#c93f2c; --rosso-soft:#fce6e1;
  --ambra:#e8a13a; --ambra-d:#a06d12; --ambra-soft:#fcefd9;
  --ok:#0f7a4b;
  --line:#edeee9; --line2:#e3e5de;
  --r:20px;
  --sans:'Nunito',-apple-system,system-ui,sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{font-family:var(--sans);background:var(--bg);color:var(--ink);font-size:16px;line-height:1.45;font-weight:500}
button{font-family:inherit;cursor:pointer}
input,select,textarea{font-family:inherit;font-size:16px}
#app{max-width:680px;margin:0 auto;min-height:100%;padding-bottom:110px}

/* ---------- header ---------- */
.topbar-block{position:sticky;top:0;z-index:40;background:var(--verde);border-radius:0 0 26px 26px;padding-bottom:16px}
.topbar{color:#fff;padding:18px 20px 14px;display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
.brand{font-weight:900;font-size:20px;letter-spacing:-.02em}
.brand small{display:block;font-weight:700;font-size:12px;letter-spacing:.01em;opacity:.85;margin-top:1px;text-transform:none}
.topbar .icon-btn{background:rgba(255,255,255,.2);border:none;color:#fff;border-radius:50%;width:38px;height:38px;font-size:16px;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.locale-bar{background:transparent;padding:0 20px;display:flex;gap:8px;overflow-x:auto;scrollbar-width:none}
.locale-bar::-webkit-scrollbar{display:none}
.locale-chip{flex-shrink:0;border:none;background:rgba(255,255,255,.18);color:#fff;border-radius:99px;padding:8px 16px;font-size:13.5px;font-weight:700;white-space:nowrap}
.locale-chip.active{background:#fff;color:var(--verde-d)}

/* ---------- sections ---------- */
.wrap{padding:18px 18px 0}
.sec-label{font-size:12px;font-weight:800;letter-spacing:.01em;text-transform:uppercase;color:var(--ink2);margin:22px 4px 12px;display:flex;align-items:center;gap:10px}
.sec-label:first-child{margin-top:6px}

/* ---------- alert scadenze ---------- */
.alert-card{border-radius:var(--r);padding:15px 16px;margin-bottom:10px;display:flex;gap:13px;align-items:center;border:none;background:var(--card);box-shadow:0 2px 10px rgba(0,0,0,.05);width:100%;text-align:left}
.alert-card.scaduto{color:var(--ink)}
.alert-card.scadenza{color:var(--ink)}
.alert-card .a-ico{font-size:18px;line-height:1;width:42px;height:42px;border-radius:14px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.alert-card.scaduto .a-ico{background:var(--rosso-soft)}
.alert-card.scadenza .a-ico{background:var(--ambra-soft)}
.alert-card b{display:block;font-size:14.5px;font-weight:800}
.alert-card span{font-size:12.5px;font-weight:600;color:var(--ink2)}
.alert-card .a-date{font-size:12.5px;font-weight:800}
.alert-card.scaduto .a-date{color:var(--rosso)}
.alert-card.scadenza .a-date{color:var(--ambra-d)}

/* ---------- ente tiles ---------- */
.tiles{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.tile{position:relative;text-align:left;background:var(--card);border:none;border-radius:24px;padding:17px;min-height:140px;display:flex;flex-direction:column;justify-content:space-between;box-shadow:0 2px 12px rgba(0,0,0,.05)}
.tile .t-sigla{font-size:10px;font-weight:800;letter-spacing:.04em;color:var(--ink3);text-transform:uppercase}
.tile h3{font-size:15.5px;font-weight:800;letter-spacing:-.01em;line-height:1.15;margin-top:2px}
.tile .t-foot{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-top:11px}
.tile .t-pct{font-size:18px;font-weight:900;line-height:1}
.tile .t-pct small{font-size:11px;font-weight:700;color:var(--ink3)}
.tile .t-missing{font-size:11px;font-weight:700;color:var(--ink3);text-align:right;line-height:1.3}
.tile.full .t-pct{color:var(--verde)}
.tile.mid .t-pct{color:var(--ambra)}
.tile.low .t-pct{color:var(--rosso)}
.pbar{height:6px;border-radius:99px;background:#eef0eb;overflow:hidden;margin-top:9px}
.pbar i{display:block;height:100%;border-radius:99px;background:var(--verde)}
.tile.low .pbar i{background:var(--rosso)}
.tile.mid .pbar i{background:var(--ambra)}

/* ---------- search ---------- */
.search-row{display:flex;gap:8px;margin-bottom:4px}
.search-row input{flex:1;border:none;border-radius:99px;padding:14px 20px;background:var(--card);color:var(--ink);font-weight:600;box-shadow:0 2px 10px rgba(0,0,0,.05)}
.search-row input::placeholder{color:var(--ink3);font-weight:600}
.search-row input:focus{outline:2px solid var(--verde)}

/* ---------- ente screen ---------- */
.page-head{padding:18px 20px 20px;background:var(--verde);color:#fff;border-radius:0 0 26px 26px}
.back-btn{background:rgba(255,255,255,.2);border:none;color:#fff;font-weight:800;font-size:13.5px;padding:7px 14px;border-radius:99px;margin-bottom:12px;display:inline-flex;align-items:center;gap:6px}
.page-head h2{font-size:24px;font-weight:900;letter-spacing:-.02em;line-height:1.1}
.page-head .ph-meta{font-size:12.5px;font-weight:600;opacity:.88;margin-top:5px}
.controllo-btn{display:flex;align-items:center;justify-content:center;gap:9px;width:100%;margin-top:16px;background:#fff;color:var(--rosso);border:none;border-radius:99px;padding:15px;font-size:15px;font-weight:900;letter-spacing:.01em;text-transform:none}
.controllo-btn:active{background:#f5f5f0}

.check-item{background:var(--card);border:none;border-radius:var(--r);padding:15px 16px;margin-bottom:10px;box-shadow:0 2px 10px rgba(0,0,0,.05)}
.check-item .ci-top{display:flex;justify-content:space-between;gap:10px;align-items:flex-start}
.ci-norma{font-size:11px;font-weight:600;color:var(--ink3);margin-top:5px;line-height:1.5}
.ente-nota{margin-top:14px;padding:14px 15px;background:var(--verde-soft);border:none;border-radius:18px;font-size:12.5px;font-weight:600;color:var(--verde-d);line-height:1.55}
.check-item h4{font-size:14.5px;font-weight:800;line-height:1.3;flex:1}
.badge{font-size:10.5px;font-weight:800;letter-spacing:.01em;padding:5px 11px;border-radius:99px;white-space:nowrap;text-transform:none}
.badge.manca{background:var(--rosso-soft);color:var(--rosso)}
.badge.ok{background:var(--verde-soft);color:var(--verde-d)}
.badge.scad{background:var(--ambra-soft);color:var(--ambra-d)}
.badge.exp{background:var(--rosso);color:#fff}
.doc-row{display:flex;align-items:center;gap:12px;margin-top:12px;padding:11px 12px;background:var(--bg);border-radius:15px;border:none}
.doc-row .d-ico{width:34px;height:34px;flex-shrink:0;border:none;border-radius:11px;background:#fff;display:flex;align-items:center;justify-content:center;font-size:8.5px;font-weight:800;color:var(--ink3);position:relative;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.doc-row .d-info{flex:1;min-width:0}
.doc-row .d-name{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.doc-row .d-meta{font-size:10.5px;font-weight:600;color:var(--ink3);margin-top:1px}
.doc-row .d-meta.warn{color:var(--ambra-d);font-weight:700}
.doc-row .d-meta.exp{color:var(--rosso);font-weight:700}
.doc-row .d-open{border:none;background:var(--verde);color:#fff;border-radius:99px;padding:9px 16px;font-size:12.5px;font-weight:800;flex-shrink:0}
.doc-row .d-edit{border:none;background:#fff;color:var(--ink2);border-radius:11px;width:38px;height:38px;font-size:14px;flex-shrink:0;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.link-btn{background:none;border:none;color:var(--verde);font-weight:800;font-size:13px;padding:10px 2px 0;text-decoration:none}

/* ---------- modalità controllo ---------- */
.controllo-screen{position:fixed;inset:0;z-index:100;background:var(--bg);overflow-y:auto}
.controllo-head{background:var(--rosso);color:#fff;padding:20px;position:sticky;top:0;z-index:5;border-radius:0 0 26px 26px}
.controllo-head .ch-tag{font-size:11.5px;font-weight:800;letter-spacing:.04em;text-transform:uppercase;display:flex;align-items:center;gap:8px}
.dot{width:9px;height:9px;border-radius:50%;background:#fff;animation:blink 1.2s infinite}
@keyframes blink{50%{opacity:.25}}
@media (prefers-reduced-motion:reduce){.dot{animation:none}}
.controllo-head h2{font-size:26px;font-weight:900;letter-spacing:-.02em;margin-top:6px}
.controllo-head .ch-loc{font-size:14px;font-weight:600;opacity:.92;margin-top:2px}
.controllo-head .ch-close{position:absolute;top:18px;right:18px;background:rgba(255,255,255,.22);border:none;color:#fff;border-radius:99px;padding:8px 16px;font-weight:800;font-size:14px}
.controllo-body{padding:18px;max-width:680px;margin:0 auto}
.controllo-body .check-item{padding:16px}
.controllo-body h4{font-size:15px}
.controllo-body .doc-row .d-open{padding:11px 18px;font-size:14px}

/* ---------- FAB & nav ---------- */
.fab{position:fixed;right:20px;bottom:96px;z-index:50;width:58px;height:58px;border-radius:21px;background:var(--verde);color:#fff;border:none;font-size:28px;font-weight:400;box-shadow:0 10px 26px rgba(23,143,90,.5);display:flex;align-items:center;justify-content:center;line-height:1}
.bottom-nav{position:fixed;left:18px;right:18px;bottom:18px;z-index:50;background:var(--ink);border:none;border-radius:99px;display:flex;max-width:644px;margin:0 auto;padding:7px;box-shadow:0 10px 30px rgba(27,36,32,.35)}
.bottom-nav button{flex:1;background:none;border:none;padding:8px 2px;display:flex;flex-direction:column;align-items:center;gap:2px;color:rgba(255,255,255,.55);font-size:8.5px;font-weight:700;border-radius:99px;min-width:0}
.bottom-nav button.active{color:#fff;background:rgba(255,255,255,.16)}
.bottom-nav .n-ico{font-size:17px;line-height:1}

/* ---------- modal ---------- */
.modal-bg{position:fixed;inset:0;z-index:90;background:rgba(27,36,32,.5);display:flex;align-items:flex-end;justify-content:center}
.modal{background:var(--card);width:100%;max-width:680px;max-height:92vh;overflow-y:auto;border-radius:28px 28px 0 0;padding:22px 20px calc(26px + env(safe-area-inset-bottom))}
.modal h3{font-size:21px;font-weight:900;letter-spacing:-.01em;margin-bottom:16px}
.f-group{margin-bottom:15px}
.f-group label{display:block;font-size:12px;font-weight:800;letter-spacing:.01em;text-transform:uppercase;color:var(--ink2);margin-bottom:7px}
.f-group input[type=text],.f-group input[type=date],.f-group input[type=password],.f-group input[type=number],.f-group select{width:100%;border:none;border-radius:14px;padding:13px 15px;background:var(--bg);color:var(--ink);font-weight:600}
.f-group input:focus,.f-group select:focus{outline:2px solid var(--verde)}
.file-drop{border:none;border-radius:16px;padding:18px;text-align:center;background:var(--bg);color:var(--ink2);font-size:14px;font-weight:700}
.file-drop.has-file{background:var(--verde-soft);color:var(--verde-d);font-weight:800}
.slot-group{margin-bottom:8px}
.slot-group .sg-name{font-size:12px;font-weight:900;text-transform:uppercase;letter-spacing:.03em;color:var(--ink2);margin:10px 0 6px}
.slot-chip{display:inline-block;border:none;background:var(--bg);border-radius:99px;padding:8px 14px;font-size:13px;font-weight:700;margin:0 6px 7px 0;color:var(--ink)}
.slot-chip.on{background:var(--verde);color:#fff}
.m-actions{display:flex;gap:10px;margin-top:18px}
.btn{flex:1;border-radius:99px;padding:15px;font-size:15.5px;font-weight:900;border:none}
.btn.primary{background:var(--verde);color:#fff}
.btn.ghost{background:var(--bg);color:var(--ink2)}
.btn.danger{background:var(--rosso-soft);color:var(--rosso-d)}

/* ---------- lock ---------- */
.lock{position:fixed;inset:0;z-index:200;background:var(--verde);color:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;text-align:center}
.lock h1{font-size:36px;font-weight:900;letter-spacing:-.02em}
.lock p{font-size:12px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;opacity:.8;margin:6px 0 26px}
.lock input{width:220px;text-align:center;font-size:28px;font-weight:800;letter-spacing:.3em;border:none;border-radius:18px;padding:16px;background:rgba(255,255,255,.18);color:#fff}
.lock input::placeholder{color:rgba(255,255,255,.5)}
.lock input:focus{outline:2px solid #fff}
.lock .lk-err{color:#ffd9d1;font-size:13.5px;font-weight:700;margin-top:12px;min-height:18px}
.lock .sm-btn{background:rgba(255,255,255,.18);border:none;color:#fff}

/* ---------- settings & misc ---------- */
.set-card{background:var(--card);border:none;border-radius:var(--r);padding:16px;margin-bottom:12px;box-shadow:0 2px 10px rgba(0,0,0,.05)}
.set-card h4{font-size:15.5px;font-weight:900;margin-bottom:4px}
.set-card p{font-size:13.5px;font-weight:600;color:var(--ink2);margin-bottom:12px}
.set-card .row{display:flex;gap:8px;flex-wrap:wrap}
.sm-btn{border:none;background:var(--bg);border-radius:99px;padding:11px 16px;font-size:14px;font-weight:800;color:var(--ink)}
.sm-btn.green{background:var(--verde);color:#fff}
.sm-btn.red{background:var(--rosso-soft);color:var(--rosso-d)}
.empty{padding:34px 18px;text-align:center;color:var(--ink2);font-size:14.5px;font-weight:600}
.toast{position:fixed;left:50%;transform:translateX(-50%);bottom:110px;z-index:300;background:var(--ink);color:#fff;border-radius:99px;padding:12px 22px;font-size:14px;font-weight:800;box-shadow:0 6px 18px rgba(0,0,0,.3);opacity:0;transition:opacity .25s;pointer-events:none}
.toast.show{opacity:1}
.scad-list .doc-row{margin-top:0;margin-bottom:9px;background:var(--card);box-shadow:0 2px 10px rgba(0,0,0,.05)}
.prod-row{display:flex;align-items:center;gap:13px;background:var(--card);border:none;border-radius:18px;padding:14px 15px;margin-bottom:10px;box-shadow:0 2px 10px rgba(0,0,0,.05);width:100%;text-align:left}
.prod-row .pr-emo{width:44px;height:44px;border-radius:14px;background:var(--verde-soft);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.prod-row .pr-info{flex:1;min-width:0}
.prod-row .pr-name{font-size:15px;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.prod-row .pr-sub{font-size:12px;font-weight:600;color:var(--ink3);margin-top:1px}
.prod-row .pr-go{font-size:22px;color:var(--ink3);font-weight:700;flex-shrink:0}
.et-seg{display:flex;gap:7px;margin-bottom:14px}
.et-seg button{flex:1;border:none;background:var(--card);color:var(--ink2);border-radius:99px;padding:10px;font-size:13.5px;font-weight:800;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.et-seg button.on{background:var(--verde);color:#fff}
.h-row{display:flex;align-items:center;gap:12px;background:var(--card);border-radius:16px;padding:12px 14px;margin-bottom:9px;box-shadow:0 2px 8px rgba(0,0,0,.05)}
.h-row .h-emo{width:40px;height:40px;border-radius:12px;background:var(--verde-soft);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.h-row .h-info{flex:1;min-width:0}
.h-row .h-nm{font-size:14.5px;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.h-row .h-meta{font-size:11.5px;font-weight:600;color:var(--ink3);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.h-row .h-day{font-size:11px;font-weight:800;color:var(--ink2);text-align:right;flex-shrink:0;line-height:1.3}
.pick-ent{display:flex;align-items:center;gap:12px;width:100%;text-align:left;background:var(--bg);border:none;border-radius:14px;padding:13px 14px;margin-bottom:9px}
.pick-ent .pe-chk{width:24px;height:24px;border-radius:7px;border:2px solid var(--line2);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:14px;color:transparent;font-weight:900}
.pick-ent.on .pe-chk{background:var(--verde);border-color:var(--verde);color:#fff}
.pick-ent .pe-nm{flex:1}
.pick-ent .pe-nm b{font-size:14.5px;font-weight:800;display:block}
.pick-ent .pe-nm span{font-size:11.5px;color:var(--ink3);font-weight:600}
.grp-ente{font-size:12.5px;font-weight:900;color:var(--rosso);text-transform:uppercase;letter-spacing:.03em;margin:20px 2px 11px;padding-bottom:6px;border-bottom:2px solid var(--rosso-soft)}
.slot-confirm{display:flex;align-items:center;gap:10px;background:var(--verde-soft);border-radius:12px;padding:13px 14px;margin-bottom:10px}
.slot-confirm .sc-ck{width:24px;height:24px;border-radius:50%;background:var(--verde);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:14px;flex-shrink:0}
.slot-confirm .sc-tx{font-size:13px;font-weight:700;line-height:1.35}
.slot-confirm .sc-tx b{display:block;font-size:14px}
@media(min-width:560px){.tiles{grid-template-columns:1fr 1fr 1fr}}
</style>
</head>
<body>
<div id="app"></div>
<div id="layer"></div>
<div class="toast" id="toast"></div>

<script>
/* =========================================================
   INREGOLA — archivio documenti per controlli ispettivi

  items:[

 {id:'vvf',sigla:'VV.F.',nome:'Vigili del Fuoco',

/* ---------- IndexedDB ---------- */
let db;
function openDB(){return new Promise((res,rej)=>{
  const rq=indexedDB.open('fascicolo',2);
  rq.onupgradeneeded=e=>{const d=e.target.result;
    if(!d.objectStoreNames.contains('docs'))d.createObjectStore('docs',{keyPath:'id',autoIncrement:true});
    if(!d.objectStoreNames.contains('settings'))d.createObjectStore('settings',{keyPath:'k'});
    if(!d.objectStoreNames.contains('logs'))d.createObjectStore('logs',{keyPath:'id',autoIncrement:true});};
  rq.onsuccess=e=>{db=e.target.result;res()};
  rq.onerror=()=>rej(rq.error);
});}
const tx=(s,m)=>db.transaction(s,m).objectStore(s);
const dbAll=s=>new Promise(r=>{const q=tx(s,'readonly').getAll();q.onsuccess=()=>r(q.result)});
const dbPut=(s,v)=>new Promise(r=>{const q=tx(s,'readwrite').put(v);q.onsuccess=()=>r(q.result)});
const dbDel=(s,k)=>new Promise(r=>{const q=tx(s,'readwrite').delete(k);q.onsuccess=()=>r()});
const dbGet=(s,k)=>new Promise(r=>{const q=tx(s,'readonly').get(k);q.onsuccess=()=>r(q.result)});
const dbClear=s=>new Promise(r=>{const q=tx(s,'readwrite').clear();q.onsuccess=()=>r()});

async function loadState(){
  const st=await dbGet('settings','app');
  if(st){S.locali=st.locali||S.locali;S.pin=st.pin||'';S.punti=st.punti||[];S.aree=st.aree||[];if(st.societa)S.societa=st.societa;if(st.loghi)S.loghi=st.loghi;if(st.scadenze)S.scadenze=st.scadenze;S.discOk=!!st.discOk;S.lockMin=(st.lockMin!==undefined?st.lockMin:5);S.prodotti=st.prodotti||[];S.etStorico=st.etStorico||[];S.operatori=st.operatori||[];S.lastBackup=st.lastBackup||null;
    // migrazione: vecchio codice operatore unico -> un operatore generico sul primo locale
    if(st.opPin&&!S.operatori.length)S.operatori=[{id:uid(),nome:'Operatore',cognome:'',sigla:'OP',pin:st.opPin,locale:0}];}
  while(S.societa.length<S.locali.length)S.societa.push({});
  while(S.loghi.length<S.locali.length)S.loghi.push(null);
  S.docs=await dbAll('docs');
  await migrateSlots();
  S.logs=await dbAll('logs');
}
// migrazione una-tantum: converte gli slot vecchi "eid:indice" nel nuovo "eid:idVoce"
async function migrateSlots(){
  let changed=0;
  for(const d of S.docs){
    if(!d.slots||!d.slots.length)continue;
    let touched=false;
    const nuovi=d.slots.map(s=>{
      const idx=s.indexOf(':');if(idx<0)return s;
      const eid=s.slice(0,idx),rest=s.slice(idx+1);
      if(!/^\d+$/.test(rest))return s;            // gi\u00E0 nuovo formato
      const e=ENTE(eid);const it=e&&e.items[parseInt(rest,10)];
      touched=true;
      return it?eid+':'+it.id:null;               // indice fuori range \u2192 scartato
    }).filter(Boolean);
    if(touched){d.slots=nuovi;await dbPut('docs',d);changed++;}
  }
  if(changed)S.docs=await dbAll('docs');
}
const saveSettings=()=>dbPut('settings',{k:'app',locali:S.locali,pin:S.pin,punti:S.punti,aree:S.aree,societa:S.societa,loghi:S.loghi,scadenze:S.scadenze,discOk:S.discOk,operatori:S.operatori,lockMin:S.lockMin,prodotti:S.prodotti,etStorico:S.etStorico,lastBackup:S.lastBackup});

/* ---------- helpers ---------- */
const $=s=>document.querySelector(s);
const esc=s=>String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const fmtDate=d=>{if(!d)return'';const[y,m,g]=d.split('-');return g+'/'+m+'/'+y};
function scadStato(doc){
  if(!doc.scadenza)return'ok';
  const today=new Date();today.setHours(0,0,0,0);
  const sc=new Date(doc.scadenza+'T00:00:00');
  const diff=(sc-today)/86400000;
  if(diff<0)return'exp';
  if(diff<=60)return'warn';
  return'ok';
}
function toast(msg){const t=$('#toast');t.textContent=msg;t.classList.add('show');clearTimeout(t._h);t._h=setTimeout(()=>t.classList.remove('show'),2200)}
const docsLocale=()=>S.docs.filter(d=>d.locale===S.locale);
const docEnti=d=>{const set=new Set((d.slots||[]).map(s=>s.split(':')[0]));(d.extraEnti||[]).forEach(e=>set.add(e));return[...set]};
function enteStats(eid){
  const ente=ENTE(eid),docs=docsLocale();
  let covered=0;
  ente.items.forEach(it=>{if(docs.some(d=>(d.slots||[]).includes(eid+':'+it.id)))covered++;});
  return{covered,total:ente.items.length,pct:Math.round(covered/ente.items.length*100)};
}

/* ---------- file open ---------- */
async function openDoc(id){
  const d=S.docs.find(x=>x.id===id);if(!d||!d.blob)return toast('File non disponibile');
  const url=URL.createObjectURL(d.blob);
  const a=document.createElement('a');a.href=url;a.target='_blank';a.rel='noopener';
  document.body.appendChild(a);a.click();a.remove();
  setTimeout(()=>URL.revokeObjectURL(url),60000);
}

// REPORT COMPLETO di un locale: stato enti + scadenze + registri ultimo mese
function stampaReportCompleto(){
  const loc=S.locale;
  const docs=S.docs.filter(d=>d.locale===loc);
  // 1) stato enti
  let entiRows=ENTI.map(e=>{
    const st=enteStats(e.id);
    const mancanti=st.total-st.covered;
    const cls=mancanti===0?'ok':'ko';
    return `<tr><td>${esc(e.sigla)} — ${esc(e.nome)}</td>
      <td style="text-align:center">${st.covered}/${st.total}</td>
      <td style="text-align:center" class="${cls}">${mancanti===0?'completo':mancanti+' da caricare'}</td></tr>`;
  }).join('');
  const sezEnti=`<div class="varea">1 · Stato documenti per ente di controllo</div>
    <table><thead><tr><th>Ente</th><th style="text-align:center">Coperti</th><th style="text-align:center">Stato</th></tr></thead><tbody>${entiRows}</tbody></table>`;

  // 2) scadenze del locale (documenti con data + scadenze libere)
  const sc=[];
  docs.filter(d=>d.scadenza).forEach(d=>sc.push({nome:d.nome,data:d.scadenza,st:scadStatoDate(d.scadenza)}));
  S.scadenze.filter(s=>s.locale===loc).forEach(s=>sc.push({nome:s.nome,data:s.data,st:scadStatoDate(s.data)}));
  sc.sort((a,b)=>(a.data||'').localeCompare(b.data||''));
  const scExp=sc.filter(x=>x.st==='exp'), scWarn=sc.filter(x=>x.st==='warn');
  let scBody='';
  if(!scExp.length&&!scWarn.length){scBody='<ul><li>Nessuna scadenza scaduta o in arrivo nei prossimi 60 giorni.</li></ul>';}
  else{
    if(scExp.length)scBody+='<div style="font-weight:700;color:#b23427;margin-top:6px">Scaduti</div><ul>'+scExp.map(x=>`<li class="ko">${esc(x.nome)} — ${fmtDate(x.data)}</li>`).join('')+'</ul>';
    if(scWarn.length)scBody+='<div style="font-weight:700;color:#a8761f;margin-top:6px">In scadenza (entro 60 giorni)</div><ul>'+scWarn.map(x=>`<li>${esc(x.nome)} — ${fmtDate(x.data)}</li>`).join('')+'</ul>';
  }
  const sezScad=`<div class="varea">2 · Scadenze</div>${scBody}`;

  // 3) registri ultimo mese (30 giorni)
  const limite=Date.now()-30*86400000;
  const logs=S.logs.filter(l=>l.locale===loc&&l.ts>=limite).sort((a,b)=>b.ts-a.ts);
  const temp=logs.filter(l=>l.tipo==='temp'), pul=logs.filter(l=>l.tipo==='pul');
  const nonConf=temp.filter(l=>!l.conforme);
  let regBody=`<p style="margin:4px 0">Registrazioni negli ultimi 30 giorni: <b>${temp.length}</b> temperature, <b>${pul.length}</b> pulizie.`;
  if(nonConf.length)regBody+=` <span class="ko">${nonConf.length} non conformità rilevate.</span>`;
  regBody+='</p>';
  if(nonConf.length){
    regBody+='<div style="font-weight:700;color:#b23427;margin-top:6px">Non conformità e azioni correttive</div><table><thead><tr><th>Data</th><th>Punto</th><th>Valore</th><th>Azione correttiva</th><th>Operatore</th></tr></thead><tbody>'+
      nonConf.map(l=>`<tr><td>${new Date(l.ts).toLocaleDateString('it-IT')}</td><td>${esc(l.punto||'')}</td><td class="ko">${l.valore}°</td><td>${esc(l.azione||'—')}</td><td>${esc(l.op||'')}</td></tr>`).join('')+'</tbody></table>';
  }
  const sezReg=`<div class="varea">3 · Registri di autocontrollo (ultimo mese)</div>${regBody}
    <p style="font-size:11px;color:#666;margin-top:6px">Lo storico completo delle registrazioni (fino a 2 anni) è esportabile dalla schermata Registri.</p>`;

  apriStampa('Report compliance — '+S.locali[loc], sezEnti+sezScad+sezReg);
}

/* ---------- scadenze ---------- */
// stato scadenza per una data string YYYY-MM-DD
function scadStatoDate(ds){
  if(!ds)return'ok';
  const today=new Date();today.setHours(0,0,0,0);
  const diff=(new Date(ds+'T00:00:00')-today)/86400000;
  if(diff<0)return'exp';if(diff<=60)return'warn';return'ok';
}
function vScadenze(){
  // unisco documenti con scadenza + scadenze libere in un'unica lista
  const items=[];
  S.docs.filter(d=>d.scadenza).forEach(d=>items.push({kind:'doc',ref:d,data:d.scadenza,nome:d.nome,locale:d.locale,st:scadStato(d)}));
  S.scadenze.forEach(s=>items.push({kind:'free',ref:s,data:s.data,nome:s.nome,locale:s.locale,st:scadStatoDate(s.data)}));
  items.sort((a,b)=>(a.data||'').localeCompare(b.data||''));
  const grp=(t,arr)=>arr.length?`<div class="sec-label">${t}</div><div class="scad-list">${arr.map(scadRow).join('')}</div>`:'';
  return topbar()+`<div class="wrap">
    <div class="sec-label" style="margin-top:6px">Scadenziario &middot; tutti i locali</div>
    <button class="controllo-btn" style="background:var(--verde);margin-top:0;margin-bottom:14px" onclick="openScadModal()">+ Aggiungi scadenza</button>
    ${items.length?'':'<div class="empty">Nessuna scadenza impostata.<br>Aggiungi una scadenza qui sopra, oppure metti una data ai documenti in Archivio.</div>'}
    ${grp('&#9888; Scaduti',items.filter(x=>x.st==='exp'))}
    ${grp('&#9203; Entro 60 giorni',items.filter(x=>x.st==='warn'))}
    ${grp('In regola',items.filter(x=>x.st==='ok'))}
  </div>`+navBar();
}
function scadRow(it){
  const st=it.st;
  if(it.kind==='doc'){const d=it.ref;
    return `<div class="doc-row">
      <div class="d-ico">${(d.fileName||'').split('.').pop().toUpperCase().slice(0,4)||'DOC'}</div>
      <div class="d-info"><div class="d-name">${esc(d.nome)}</div>
        <div class="d-meta ${st==='exp'?'exp':st==='warn'?'warn':''}">${esc(S.locali[d.locale]||'?')} &middot; ${fmtDate(d.scadenza)}</div></div>
      <button class="d-edit" onclick="addScadCalendar('doc',${d.id})" aria-label="Aggiungi al calendario">&#128197;</button>
      <button class="d-edit" onclick="openDocModal(${d.id})">&#9998;</button>
      <button class="d-open" onclick="openDoc(${d.id})">Apri</button>
    </div>`;}
  const s=it.ref;
  const docColl=s.docId?S.docs.find(x=>x.id===s.docId):null;
  return `<div class="doc-row">
    <div class="d-ico" style="border-style:dashed">&#9201;</div>
    <div class="d-info"><div class="d-name">${esc(s.nome)}${s.ric?' &#8635;':''}</div>
      <div class="d-meta ${st==='exp'?'exp':st==='warn'?'warn':''}">${esc(S.locali[s.locale]||'?')} &middot; ${fmtDate(s.data)}${s.ric?' &middot; ogni '+(s.ric==='6m'?'6 mesi':s.ric==='12m'?'anno':s.ric==='24m'?'2 anni':'')+'':''}</div></div>

function creaICS(){
  const p=S._calPend;if(!p)return;
  const g=parseInt($('#calGiorni').value,10);
  const d=p.data.replace(/-/g,'');
  const dtNext=new Date(p.data+'T00:00:00');dtNext.setDate(dtNext.getDate()+1);
  const dEnd=dtNext.toISOString().slice(0,10).replace(/-/g,'');
  const uid=Date.now()+'@inregola';
  const stamp=new Date().toISOString().replace(/[-:.]/g,'').slice(0,15)+'Z';
  const titolo='Scadenza: '+p.nome+' ('+S.locali[p.locale]+')';
  const ics=['BEGIN:VCALENDAR','VERSION:2.0','PRODID:-//EssereInRegola//IT','CALSCALE:GREGORIAN','METHOD:PUBLISH',
    'BEGIN:VEVENT','UID:'+uid,'DTSTAMP:'+stamp,'DTSTART;VALUE=DATE:'+d,'DTEND;VALUE=DATE:'+dEnd,
    'SUMMARY:'+titolo,'DESCRIPTION:Promemoria generato da EssereInRegola.',
    'BEGIN:VALARM','TRIGGER:-P'+g+'D','ACTION:DISPLAY','DESCRIPTION:'+titolo,'END:VALARM',
    'END:VEVENT','END:VCALENDAR'].join('\r\n');
  const blob=new Blob([ics],{type:'text/calendar'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download=p.nome.replace(/[^a-z0-9]+/gi,'-').toLowerCase()+'.ics';
  document.body.appendChild(a);a.click();a.remove();
  setTimeout(()=>URL.revokeObjectURL(url),30000);
  S._calPend=null;closeModal();toast('Evento pronto: aprilo per aggiungerlo al calendario');
}

function vStoricoEtichette(){
  const items=S.etStorico.filter(e=>e.locale===S.locale).sort((a,b)=>b.ts-a.ts);
  if(!items.length)return '<div class="empty">Nessuna etichetta ancora generata.<br>Le etichette che stampi compariranno qui come registro di tracciabilit\u00E0.</div>';
  // raggruppo per giorno
  const oggi=new Date();oggi.setHours(0,0,0,0);
  const ieri=new Date(oggi);ieri.setDate(ieri.getDate()-1);
  const etich=d=>{const x=new Date(d);x.setHours(0,0,0,0);
    if(x.getTime()===oggi.getTime())return 'Oggi';
    if(x.getTime()===ieri.getTime())return 'Ieri';
    return x.toLocaleDateString('it-IT',{day:'2-digit',month:'long'});};
  let html='',cur=null;
  items.forEach(e=>{
    const g=etich(e.ts);
    if(g!==cur){html+=`<div class="sec-label" style="margin-top:16px">${g}</div>`;cur=g;}
    const dt=new Date(e.ts);
    const ora=String(dt.getHours()).padStart(2,'0')+':'+String(dt.getMinutes()).padStart(2,'0');
    const giorno=String(dt.getDate()).padStart(2,'0')+'/'+String(dt.getMonth()+1).padStart(2,'0');
    const meta=[e.lotto?'Lotto '+esc(e.lotto):'',e.forn?esc(e.forn):'',e.comanda?'entro '+fmtDate(e.comanda).slice(0,5):''].filter(Boolean).join(' \u00B7 ');
    html+=`<div class="h-row"><div class="h-emo">&#127991;</div>
      <div class="h-info"><div class="h-nm">${esc(e.nome)}</div><div class="h-meta">${meta||'\u2014'}</div></div>
      <div class="h-day">${giorno}<br>${ora}</div></div>`;
  });
  html+=`<div class="row" style="display:flex;gap:8px;margin-top:16px">
    <button class="sm-btn green" style="flex:1" onclick="exportStorico()">Esporta CSV</button>
    ${S.role!=='op'?'<button class="sm-btn red" onclick="clearStorico()">Cancella storico</button>':''}
  </div>`;
  return html;
}
function exportStorico(){
  const items=S.etStorico.filter(e=>e.locale===S.locale).sort((a,b)=>a.ts-b.ts);
  if(!items.length)return toast('Nessuna etichetta da esportare');
  const head='Data;Ora;Prodotto;Lotto;Fornitore;Quantita;Aperto il;Da utilizzare entro;Operatore';
  const rows=items.map(e=>{const dt=new Date(e.ts);
    const data=dt.toLocaleDateString('it-IT'),ora=String(dt.getHours()).padStart(2,'0')+':'+String(dt.getMinutes()).padStart(2,'0');
    return [data,ora,e.nome,e.lotto||'',e.forn||'',e.qta||'',e.aperto?fmtDate(e.aperto):'',e.comanda?fmtDate(e.comanda):'',e.op||''].map(c=>'"'+String(c).replace(/"/g,'""')+'"').join(';');});
  const csv='\ufeff'+head+'\n'+rows.join('\n');
  const url=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));
  const a=document.createElement('a');a.href=url;
  a.download='storico-etichette-'+esc(S.locali[S.locale]).replace(/[^a-z0-9]/gi,'_')+'-'+new Date().toISOString().slice(0,10)+'.csv';
  document.body.appendChild(a);a.click();a.remove();
  setTimeout(()=>URL.revokeObjectURL(url),30000);
  toast('Storico esportato');
}

function storicoHTML(logsLoc){
  let recent;
  if(S.storMese){
    // mese specifico: tutte le registrazioni di quel mese, nessun limite
    recent=logsLoc.filter(l=>{const d=new Date(l.ts);return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')===S.storMese;})
      .sort((a,b)=>b.ts-a.ts);
  }else{
    // default: ultimi 60 giorni, max 200 righe
    const cut=Date.now()-60*86400000;
    recent=logsLoc.filter(l=>l.ts>=cut).sort((a,b)=>b.ts-a.ts).slice(0,200);
  }
  if(!recent.length)return'<div class="empty">Nessuna registrazione in questo periodo.</div>';
  let out='',lastDay='';
  for(const l of recent){
    const d=new Date(l.ts),day=d.toLocaleDateString('it-IT',{weekday:'short',day:'2-digit',month:'2-digit'});
    if(day!==lastDay){out+=`<div class="sec-label">${day}</div>`;lastDay=day;}
    const ora=d.toLocaleTimeString('it-IT',{hour:'2-digit',minute:'2-digit'});
    out+=`<div class="doc-row">
      <div class="d-ico">${l.tipo==='temp'?'&deg;C':'PUL'}</div>
      <div class="d-info"><div class="d-name">${esc(l.tipo==='temp'?l.punto:l.area)}${l.tipo==='temp'?' &middot; '+l.valore+'&deg;C':''}</div>
        <div class="d-meta ${l.tipo==='temp'&&!l.conforme?'exp':''}">${ora}${l.op?' &middot; '+esc(l.op):''}${l.tipo==='temp'&&!l.conforme?' &middot; FUORI RANGE'+(l.azione?' &middot; '+esc(l.azione):''):''}</div></div>
      ${S.role!=='op'?`<button class="d-edit" onclick="delLog(${l.id})" aria-label="Elimina">&#10005;</button>`:''}
    </div>`;
  }
  return out;
}

function addPunto(){
  const n=S.punti.filter(p=>p.locale===S.locale).length+1;
  const nome=prompt('Nome del punto di controllo \u2014 mantieni il numero, \u00E8 richiesto dall\u2019autocontrollo (completa pure: es. Frigo '+n+' \u2013 Bibite):','Frigo '+n);if(!nome||!nome.trim())return;
  const min=parseFloat(String(prompt('Temperatura MINIMA consentita (\u00B0C):','0')).replace(',','.'));

  if(isNaN(min)||isNaN(max)||min>=max)return toast('Range non valido');

function addArea(){

async function regTemp(pid){
  const p=S.punti.find(x=>x.id===pid);if(!p)return;
  const inp=document.getElementById('tin_'+pid);
  const v=parseFloat(String(inp.value).replace(',','.'));
  if(isNaN(v))return toast('Inserisci la temperatura');
  const conforme=v>=p.min&&v<=p.max;
  let azione=null;
  if(!conforme)azione=prompt('\u26A0\uFE0F Temperatura FUORI RANGE!\nDescrivi l\u2019azione correttiva adottata (es. spostato i prodotti, chiamato il tecnico):')||'';
  await dbPut('logs',{tipo:'temp',locale:S.locale,punto:p.nome,min:p.min,max:p.max,valore:v,conforme,azione,op:siglaCorrente(),ts:Date.now()});
  S.logs=await dbAll('logs');render();toast(conforme?'Temperatura registrata \u2713':'Registrata con non conformit\u00E0');
}
async function regPulizia(aid){
  const a=S.aree.find(x=>x.id===aid);if(!a)return;
  await dbPut('logs',{tipo:'pul',locale:S.locale,area:a.nome,op:siglaCorrente(),ts:Date.now()});
  S.logs=await dbAll('logs');render();toast('Pulizia registrata \u2713');
}
async function delLog(id){
  if(!confirm('Eliminare questa registrazione? L\u2019operazione \u00E8 definitiva.'))return;
  await dbDel('logs',id);S.logs=await dbAll('logs');render();
}
function exportRegistroCSV(){
  const sel=document.getElementById('expMese');
  const d0=new Date(),kDef=d0.getFullYear()+'-'+String(d0.getMonth()+1).padStart(2,'0');
  const[y,m]=(sel&&sel.value?sel.value:kDef).split('-').map(Number);
  const rows=S.logs.filter(l=>{const d=new Date(l.ts);return l.locale===S.locale&&d.getFullYear()===y&&d.getMonth()===m-1;})
    .sort((a,b)=>a.ts-b.ts);
  if(!rows.length)return toast('Nessuna registrazione in quel mese');
  const soc=S.societa[S.locale]||{};
  const csv=[];
  csv.push('REGISTRO DI AUTOCONTROLLO — '+S.locali[S.locale].replace(/;/g,','));
  if(soc.ragione)csv.push((soc.ragione+(soc.piva?' — P.IVA/CF '+soc.piva:'')+(soc.rea?' — REA '+soc.rea:'')).replace(/;/g,','));
  if(soc.indirizzo)csv.push(soc.indirizzo.replace(/;/g,','));
  csv.push('');
  csv.push('data;ora;tipo;punto o area;valore C;range;esito;azione correttiva;operatore');
  for(const l of rows){const d=new Date(l.ts);
    csv.push([d.toLocaleDateString('it-IT'),d.toLocaleTimeString('it-IT',{hour:'2-digit',minute:'2-digit'}),
      l.tipo==='temp'?'temperatura':'pulizia',(l.punto||l.area||'').replace(/;/g,','),
      l.tipo==='temp'?String(l.valore).replace('.',','):'',l.tipo==='temp'?(l.min+' / '+l.max):'',
      l.tipo==='temp'?(l.conforme?'conforme':'NON CONFORME'):'eseguita',
      (l.azione||'').replace(/;/g,','),(l.op||'').replace(/;/g,',')].join(';'));}
  const blob=new Blob(['\uFEFF'+csv.join('\n')],{type:'text/csv'});
  const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;
  a.download='registro-'+S.locali[S.locale].toLowerCase().replace(/[^a-z0-9]+/g,'-')+'-'+y+'-'+String(m).padStart(2,'0')+'.csv';
  document.body.appendChild(a);a.click();a.remove();setTimeout(()=>URL.revokeObjectURL(url),30000);
}
function stampaRegistro(){
  const sel=document.getElementById('expMese');
  const d0=new Date(),kDef=d0.getFullYear()+'-'+String(d0.getMonth()+1).padStart(2,'0');
  const[y,m]=(sel&&sel.value?sel.value:kDef).split('-').map(Number);
  const rows=S.logs.filter(l=>{const d=new Date(l.ts);return l.locale===S.locale&&d.getFullYear()===y&&d.getMonth()===m-1;}).sort((a,b)=>a.ts-b.ts);
  if(!rows.length)return toast('Nessuna registrazione in quel mese');
  const mese=new Date(y,m-1,1).toLocaleDateString('it-IT',{month:'long',year:'numeric'});
  let tr=rows.map(l=>{const d=new Date(l.ts);
    return `<tr><td>${d.toLocaleDateString('it-IT')}</td><td>${d.toLocaleTimeString('it-IT',{hour:'2-digit',minute:'2-digit'})}</td>
    <td>${l.tipo==='temp'?'Temperatura':'Pulizia'}</td><td>${esc(l.punto||l.area||'')}</td>
    <td>${l.tipo==='temp'?l.valore+' °C':'—'}</td>
    <td>${l.tipo==='temp'?(l.conforme?'<span class="ok">conforme</span>':'<span class="ko">NON CONF.</span>'):'eseguita'}</td>
    <td style="font-size:10px">${esc(l.azione||'')}</td><td>${esc(l.op||'')}</td></tr>`;}).join('');
  const corpo=`<div class="varea">Registro di autocontrollo — ${mese}</div>
    <table><thead><tr><th>Data</th><th>Ora</th><th>Tipo</th><th>Punto / Area</th><th>Valore</th><th>Esito</th><th>Azione correttiva</th><th>Op.</th></tr></thead>
    <tbody>${tr}</tbody></table>`;
  apriStampa('Registro autocontrollo — '+mese,corpo);
}

      <div style="max-height:230px;overflow-y:auto;border:1.5px solid var(--line2);border-radius:10px;padding:10px;background:#fff">
      ${ENTI.map(e=>`<div class="slot-group"><div class="sg-name">${e.sigla}</div>
        ${e.items.map(it=>{const k=e.id+':'+it.id;
          return `<button class="slot-chip ${slots.has(k)?'on':''}" data-slot="${k}" onclick="this.classList.toggle('on')">${esc(it.t)}</button>`;}).join('')}
      </div>`).join('')}
      </div></div>
    <div class="m-actions">
      ${d?`<button class="btn danger" onclick="deleteDoc(${d.id})">Elimina</button>`:''}
      <button class="btn ghost" onclick="closeModal()">Annulla</button>
      <button class="btn primary" onclick="saveDoc(${d?d.id:'null'})">Salva</button>
    </div>
   </div></div>`;
}
function closeModal(){$('#layer').innerHTML='';modalFile=null}
function pickFile(inp){
  if(!inp.files.length)return;
  modalFile=inp.files[0];
  const drop=$('#fileDrop');drop.classList.add('has-file');drop.textContent=modalFile.name;
  const nome=$('#docNome');
  if(!nome.value)nome.value=modalFile.name.replace(/\.[^.]+$/,'').replace(/[_-]+/g,' ');
}
async function saveDoc(id){
  const nome=$('#docNome').value.trim();
  if(!nome)return toast('Dai un nome al documento');
  const old=id?S.docs.find(x=>x.id===id):null;
  if(!old&&!modalFile)return toast('Scegli un file da caricare');
  const slots=[...document.querySelectorAll('.slot-chip.on')].map(b=>b.dataset.slot);
  const doc={
    ...(old||{}),
    nome,
    locale:parseInt($('#docLocale').value,10),
    scadenza:$('#docScad').value||null,
    slots,extraEnti:old?old.extraEnti||[]:[],
    fileName:modalFile?modalFile.name:(old?old.fileName:''),
    blob:modalFile||(old?old.blob:null),
    updated:Date.now()
  };
  if(id)doc.id=id;
  const newId=await dbPut('docs',doc);
  if(!id)doc.id=newId;
  S.docs=await dbAll('docs');
  closeModal();render();toast('Documento salvato');
}
async function deleteDoc(id){
  if(!confirm('Eliminare definitivamente questo documento?'))return;
  await dbDel('docs',id);S.docs=await dbAll('docs');
  closeModal();render();toast('Documento eliminato');
}

/* ---------- dati societa ---------- */
function openSocietaModal(i){
  const s=S.societa[i]||{};
  const f=(id,lab,val,ph)=>`<div class="f-group"><label>${lab}</label><input type="text" id="${id}" value="${esc(val||'')}" placeholder="${ph||''}"></div>`;
  $('#layer').innerHTML=`<div class="modal-bg" onclick="if(event.target===this)closeModal()"><div class="modal">
    <h3>Dati societ\u00E0 \u2014 ${esc(S.locali[i])}</h3>
    ${f('soRag','Ragione sociale',s.ragione,'Es. ROSSI SRL')}
    ${f('soInd','Sede legale',s.indirizzo,'Via, CAP, Comune (Prov.)')}
    ${f('soPiva','P.IVA / C.F.',s.piva)}
    ${f('soRea','REA',s.rea,'Es. PD 123456')}
    ${f('soPec','PEC',s.pec)}
    ${f('soEmail','Email',s.email)}
    ${f('soSdi','Codice SDI',s.sdi)}
    <div class="m-actions">
      <button class="btn ghost" onclick="closeModal()">Annulla</button>
      <button class="btn primary" onclick="saveSocieta(${i})">Salva</button>
    </div></div></div>`;
}
function pickLogo(i,inp){
  if(!inp.files.length)return;const file=inp.files[0];
  const r=new FileReader();
  r.onload=()=>{const img=new Image();img.onload=()=>{
    const max=240,sc=Math.min(1,max/Math.max(img.width,img.height));
    const c=document.createElement('canvas');c.width=img.width*sc;c.height=img.height*sc;
    c.getContext('2d').drawImage(img,0,0,c.width,c.height);
    S.loghi[i]=c.toDataURL('image/png');saveSettings();render();toast('Logo caricato');
  };img.src=r.result;};
  r.readAsDataURL(file);
}
function removeLogo(i){if(confirm('Rimuovere il logo?')){S.loghi[i]=null;saveSettings();render();}}
function saveSocieta(i){
  S.societa[i]={ragione:$('#soRag').value.trim(),indirizzo:$('#soInd').value.trim(),piva:$('#soPiva').value.trim(),
    rea:$('#soRea').value.trim(),pec:$('#soPec').value.trim(),email:$('#soEmail').value.trim(),sdi:$('#soSdi').value.trim()};
  saveSettings();closeModal();render();toast('Dati societ\u00E0 salvati');
}

/* ---------- settings actions ---------- */
function renameLocale(i,v){if(v.trim()){S.locali[i]=v.trim();saveSettings();render()}}
function addLocale(){S.locali.push('Nuovo locale');S.societa.push({});S.loghi.push(null);saveSettings();render()}
async function removeLocale(i){
  const n=S.docs.filter(d=>d.locale===i).length;
  if(!confirm(`Eliminare «${S.locali[i]}»?${n?` Verranno eliminati anche ${n} documenti collegati.`:''}`))return;
  if(!chiediPinTitolare())return;
  for(const d of S.docs.filter(x=>x.locale===i))await dbDel('docs',d.id);
  S.docs=(await dbAll('docs')).map(d=>{if(d.locale>i)d.locale--;dbPut('docs',d);return d});
  S.locali.splice(i,1);S.societa.splice(i,1);S.loghi.splice(i,1);if(S.locale>=S.locali.length)S.locale=0;
  saveSettings();render();
}
function chiediPinTitolare(){
  if(!S.pin)return true; // nessun PIN impostato: nessuna verifica possibile
  const p=prompt('Per procedere inserisci il PIN del titolare:');
  if(p===null)return false;
  if(p===S.pin)return true;
  toast('PIN titolare errato');return false;
}
function setPin(){
  const p=prompt('Nuovo PIN (4-8 cifre):');
  if(p&&/^\d{4,8}$/.test(p)){S.pin=p;saveSettings();render();toast('PIN impostato')}
  else if(p!==null)toast('PIN non valido: solo cifre, da 4 a 8');
}
function clearPin(){if(confirm('Rimuovere il PIN titolare? Verranno rimossi anche tutti gli operatori e il blocco automatico.')){S.pin='';S.operatori=[];saveSettings();render()}}
function openOpModal(oid){
  const o=oid?S.operatori.find(x=>x.id===oid):null;
  $('#layer').innerHTML=`<div class="modal-bg" onclick="if(event.target===this)closeModal()"><div class="modal">
    <h3>${o?'Modifica operatore':'Nuovo operatore'}</h3>
    <div class="f-group"><label>Nome</label>
      <input type="text" id="opNome" value="${o?esc(o.nome):''}" placeholder="Es. Mario"></div>
    <div class="f-group"><label>Cognome</label>
      <input type="text" id="opCognome" value="${o?esc(o.cognome||''):''}" placeholder="Es. Rossi"></div>
    <div class="f-group"><label>Sigla (firma sui registri)</label>
      <input type="text" id="opSigla" maxlength="8" value="${o?esc(o.sigla||''):''}" placeholder="Es. MR"></div>
    <div class="f-group"><label>PIN personale (4-8 cifre)</label>
      <input type="text" inputmode="numeric" id="opPin" maxlength="8" value="${o?esc(o.pin||''):''}" placeholder="Es. 2468"></div>
    <div class="f-group"><label>Locale assegnato</label>
      <select id="opLocale">${S.locali.map((l,i)=>`<option value="${i}" ${(o?o.locale:S.locale)===i?'selected':''}>${esc(l)}</option>`).join('')}</select></div>
    <div class="m-actions">
      ${o?`<button class="btn danger" onclick="delOp('${o.id}')">Elimina</button>`:''}
      <button class="btn ghost" onclick="closeModal()">Annulla</button>
      <button class="btn primary" onclick="saveOp(${o?`'${o.id}'`:'null'})">Salva</button>
    </div></div></div>`;
}
function saveOp(oid){
  const nome=$('#opNome').value.trim();
  const cognome=$('#opCognome').value.trim();
  const sigla=$('#opSigla').value.trim();
  const pin=$('#opPin').value.trim();
  const locale=parseInt($('#opLocale').value,10);
  if(!nome)return toast('Indica il nome');
  if(!sigla)return toast('Indica la sigla');
  if(!/^\d{4,8}$/.test(pin))return toast('PIN non valido: solo cifre, da 4 a 8');
  if(pin===S.pin)return toast('Il PIN deve essere diverso dal PIN titolare');
  if(S.operatori.some(o=>o.pin===pin&&o.id!==oid))return toast('PIN gi\u00E0 usato da un altro operatore');
  if(oid){const i=S.operatori.findIndex(x=>x.id===oid);S.operatori[i]={...S.operatori[i],nome,cognome,sigla,pin,locale};}
  else S.operatori.push({id:uid(),nome,cognome,sigla,pin,locale});
  saveSettings();closeModal();render();toast('Operatore salvato');
}
function delOp(oid){
  if(!confirm('Eliminare questo operatore? Le registrazioni gi\u00E0 firmate restano nello storico.'))return;
  S.operatori=S.operatori.filter(x=>x.id!==oid);saveSettings();closeModal();render();toast('Operatore eliminato');
}
function setLockMin(v){S.lockMin=parseInt(v,10);S.lastActive=Date.now();saveSettings();toast('Blocco automatico aggiornato');}
async function resetAll(){
  if(!confirm('ATTENZIONE: verranno cancellati TUTTI i documenti. Continuare?'))return;
  if(!confirm('Confermi la cancellazione definitiva?'))return;
  if(!chiediPinTitolare())return;
  await dbClear('docs');await dbClear('settings');location.reload();
}

/* ---------- backup ---------- */
const blobToB64=b=>new Promise(r=>{const f=new FileReader();f.onload=()=>r(f.result);f.readAsDataURL(b)});
async function b64ToBlob(u){const r=await fetch(u);return r.blob()}
async function exportBackup(){
  toast('Preparazione backup…');
  const docs=[];
  for(const d of S.docs){
    const{blob,...rest}=d;
    docs.push({...rest,fileData:blob?await blobToB64(blob):null});
  }
  const data=JSON.stringify({v:3,exported:new Date().toISOString(),locali:S.locali,societa:S.societa,loghi:S.loghi,scadenze:S.scadenze,discOk:S.discOk,pin:S.pin,operatori:S.operatori,lockMin:S.lockMin,prodotti:S.prodotti,etStorico:S.etStorico,punti:S.punti,aree:S.aree,docs,logs:S.logs});
  const url=URL.createObjectURL(new Blob([data],{type:'application/json'}));
  const a=document.createElement('a');a.href=url;
  a.download='inregola-backup-'+new Date().toISOString().slice(0,10)+'.json';
  document.body.appendChild(a);a.click();a.remove();
  setTimeout(()=>URL.revokeObjectURL(url),30000);
  S.lastBackup=Date.now();S.bkDismissed=0;saveSettings();
  if(S.screen==='settings')render();
  toast('Backup creato \u2713 ora spostalo su Google Drive o iCloud');
}
// giorni interi trascorsi dall'ultimo backup; null se mai fatto
function giorniDaBackup(){
  if(!S.lastBackup)return null;
  return Math.floor((Date.now()-S.lastBackup)/86400000);
}
async function importBackup(file){
  if(!file)return;
  try{
    const data=JSON.parse(await file.text());
    if(!data.docs)throw new Error('formato');
    if(!confirm(`Il backup contiene ${data.docs.length} documenti. L\u2019archivio attuale verrà sostituito. Continuare?`))return;
    await dbClear('docs');
    for(const d of data.docs){
      const{fileData,id,...rest}=d;
      await dbPut('docs',{...rest,blob:fileData?await b64ToBlob(fileData):null});
    }
    await dbClear('logs');
    for(const l of(data.logs||[])){const{id,...r}=l;await dbPut('logs',r);}
    S.locali=data.locali||S.locali;S.pin=data.pin||'';S.lockMin=(data.lockMin!==undefined?data.lockMin:5);S.prodotti=data.prodotti||[];S.etStorico=data.etStorico||[];
    S.operatori=data.operatori||[];
    if(data.opPin&&!S.operatori.length)S.operatori=[{id:uid(),nome:'Operatore',cognome:'',sigla:'OP',pin:data.opPin,locale:0}];
    S.lastBackup=data.lastBackup||null;
    S.punti=data.punti||[];S.aree=data.aree||[];
    S.societa=data.societa||S.locali.map(()=>({}));while(S.societa.length<S.locali.length)S.societa.push({});
    S.loghi=data.loghi||S.locali.map(()=>null);while(S.loghi.length<S.locali.length)S.loghi.push(null);
    S.scadenze=data.scadenze||[];S.discOk=!!data.discOk;
    await saveSettings();S.docs=await dbAll('docs');S.logs=await dbAll('logs');
    render();toast('Backup ripristinato');
  }catch(e){toast('File di backup non valido')}
}
async function showStorage(){
  const el=$('#storageInfo');if(!el)return;
  if(navigator.storage&&navigator.storage.estimate){
    const{usage,quota}=await navigator.storage.estimate();
    el.textContent=(usage/1048576).toFixed(1)+' MB usati su circa '+(quota/1048576).toFixed(0)+' MB disponibili.';
  }else el.textContent='Informazione non disponibile su questo browser.';
}

/* ---------- lock ---------- */
function renderLock(){
  $('#app').innerHTML='';
  const pinLens=[String(S.pin).length,...S.operatori.map(o=>String(o.pin||'').length),8];
  const maxlen=Math.max(...pinLens);
  $('#layer').innerHTML=`<div class="lock">
    <h1>EssereInRegola</h1><p>Inserisci il codice</p>
    <input type="password" inputmode="numeric" maxlength="${maxlen}" id="pinInput" autofocus
      onkeydown="if(event.key==='Enter')tryPin()" oninput="maybeTryPin(this)">
    <div class="lk-err" id="pinErr"></div>
    ${S.operatori.length?'<p style="margin-top:22px;opacity:.7;font-size:11px">Codice titolare o codice operatore</p>':''}
  </div>`;
  setTimeout(()=>{const i=$('#pinInput');if(i)i.focus()},150);
}
// prova automatica quando la lunghezza raggiunge uno dei codici validi
function maybeTryPin(inp){
  const L=inp.value.length;
  const minOp=S.operatori.length?Math.min(...S.operatori.map(o=>String(o.pin||'').length)):Infinity;
  if(L>=String(S.pin).length || L>=minOp)tryPin();
}
function tryPin(){
  const i=$('#pinInput');const v=i.value;
  if(v===S.pin){S.role='owner';S.opCorrente=null;S.lastActive=Date.now();$('#layer').innerHTML='';render();return}
  const op=S.operatori.find(o=>o.pin===v);
  if(op){S.role='op';S.opCorrente=op.id;S.locale=op.locale;S.screen='registri';S.lastActive=Date.now();$('#layer').innerHTML='';render();return}
  const maxOp=S.operatori.length?Math.max(...S.operatori.map(o=>String(o.pin||'').length)):0;
  if(v.length>=Math.max(String(S.pin).length,maxOp)){$('#pinErr').textContent='Codice errato';i.value='';}
}
function lockNow(){S.role=null;S.opCorrente=null;S.unlocked=false;render()}
// autoblocco per inattività: controllo al rientro e a ogni interazione
function touchActivity(){
  if(!S.pin||!S.role)return;
  const now=Date.now();
  if(S.lockMin>0 && now-S.lastActive > S.lockMin*60000){lockNow();return;}
  S.lastActive=now;
}
function startLockWatch(){
  ['click','keydown','touchstart','visibilitychange'].forEach(ev=>
    document.addEventListener(ev,()=>{
      if(document.visibilityState==='visible'||ev!=='visibilitychange')touchActivity();
    },true));
}

/* ---------- nav ---------- */
function go(screen,ente){if(S.role==='op'&&screen!=='registri'&&screen!=='etichette')return;S.screen=screen;S.ente=ente||null;S.query='';render();window.scrollTo(0,0);if(screen==='settings')showStorage()}
function setLocale(i){if(S.role==='op')return;S.locale=i;render()}
// operatore loggato (oggetto) e sigla da apporre sulle registrazioni
function opCorr(){return S.opCorrente?S.operatori.find(o=>o.id===S.opCorrente):null;}
function siglaCorrente(){const o=opCorr();return o?o.sigla:'Titolare';}
function bindNav(){}

/* ---------- avvio ---------- */
(async()=>{
  await openDB();
  await loadState();
  startLockWatch();
  render();
})();
</script>

    navigator.serviceWorker.register('service-worker.js').catch(()=>{});
  });
